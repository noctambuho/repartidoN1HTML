<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Contacto</h2>
    <form method="post">
        <label for="name">Nombre:</label> <br>
        <input type="text" name="name" id="name" placeholder="Ingrese su nombre" required> <br>

        <label for="email">E-mail</label> <br>
        <input type="text" name="email" id="email" placeholder="Ingrese su e-mail" required> <br>

        <label for="age">Edad:</label> <br>
        <input type="number" name="age" id="age" placeholder="Ingrese su edad" required> <br>

        <label for="comments">Comentarios:</label> <br>
        <textarea name="comments" id="comments" placeholder="Hágase oír"></textarea> <br>
        <button type="submit">Enviar formulario</button>
    </form>
</body>
</html>
